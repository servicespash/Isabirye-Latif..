<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <script>
      // Gracefully handle environments (like sandboxed iframes or test runners) where
      // third-party scripts or extensions attempt to override window.fetch,
      // preventing crashes due to read-only getters.
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          
          function setupGetterSetter(obj, prop) {
            var desc = Object.getOwnPropertyDescriptor(obj, prop);
            if (!desc || desc.configurable) {
              Object.defineProperty(obj, prop, {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val || originalFetch;
                },
                configurable: true,
                enumerable: true
              });
              return true;
            }
            return false;
          }

          // Try defining on window directly first
          var success = setupGetterSetter(window, 'fetch');
          
          // If not successful or to be safe, also try Window.prototype
          if (typeof Window !== 'undefined' && Window.prototype) {
            setupGetterSetter(Window.prototype, 'fetch');
          }
        } catch (e) {
          console.warn("Window fetch override guard active:", e);
        }
      })();
    </script>
